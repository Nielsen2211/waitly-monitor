<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Log ind – Bolig Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="theme-color" content="#4f7186">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fjord: #4f7186; --fjord-dark: #3b5868;
      --grad: linear-gradient(135deg, #5a7e93, #4f7186 60%, #43627a);
      --ink: #2c2a25; --mut: #716e63; --hint: #9b978c; --bd: #e4dfd5; --surf: #fdfcfa;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(900px 380px at 100% -10%, rgba(79,113,134,.06), transparent 60%),
        radial-gradient(800px 360px at -10% 0%, rgba(179,114,74,.04), transparent 55%),
        #f5f3ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--ink);
    }
    .card {
      background: var(--surf);
      border-radius: 18px;
      padding: 34px 26px;
      width: 100%;
      max-width: 384px;
      border: 1px solid var(--bd);
      box-shadow: 0 14px 38px rgba(45,40,32,.10);
      animation: cardIn .5s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .logo {
      text-align: center;
      margin-bottom: 26px;
    }
    .logo-mark {
      width: 46px; height: 46px;
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(79,113,134,.28));
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.02em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      font-size: 13px;
      color: var(--hint);
      margin-top: 5px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--mut);
      margin-bottom: 6px;
    }
    input[type=password] {
      width: 100%;
      border: 1px solid var(--bd);
      border-radius: 11px;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    input[type=password]:focus {
      border-color: var(--fjord);
      box-shadow: 0 0 0 3px rgba(79,113,134,.14);
    }
    .btn {
      width: 100%;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(79,113,134,.26);
      transition: transform .12s, box-shadow .15s, filter .15s;
    }
    .btn:hover  { filter: brightness(1.05); box-shadow: 0 10px 22px rgba(79,113,134,.32); }
    .btn:active { transform: translateY(1px); }
    .error {
      background: #f6ece9;
      border: 1px solid #ecd6cf;
      border-left: 4px solid #a8584d;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      color: #8a463c;
      margin-bottom: 16px;
    }
    .first-run {
      background: #eef2f3;
      border: 1px solid #d6e0e5;
      border-left: 4px solid var(--fjord);
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--fjord-dark);
      margin-bottom: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5a7e93"/><stop offset="1" stop-color="#43627a"/></linearGradient></defs>
        <rect width="32" height="32" rx="8" fill="url(#lg)"/>
        <path d="M16 6.4 L25.6 14.2 V25.2 H6.4 V14.2 Z" fill="#fdfcfa"/>
        <rect x="13.4" y="17.7" width="5.2" height="7.5" rx="1.1" fill="#4f7186"/>
      </svg>
      <h1>Bolig Monitor</h1>
      <p>Log ind for at se dine boliger</p>
    </div>

    {% if not app_pw_set %}
    <div class="first-run">
      Første gang? Klik bare "Log ind" – du sætter et kodeord under ⚙️ Indstillinger.
    </div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% if app_pw_set %}
      <div class="form-group">
        <label for="pw">Adgangskode</label>
        <input type="password" id="pw" name="password" placeholder="••••••••"
               autofocus autocomplete="current-password">
      </div>
      {% endif %}

      <button type="submit" class="btn">Log ind</button>
    </form>
  </div>
</body>
</html>
